    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [profile, setProfile] = useState(null);
      const [simulations, setSimulations] = useState([]);
      const [loadingDb, setLoadingDb] = useState(false);
      const [stocks, setStocks] = useState(INITIAL_STOCKS);
      const [sidebarOpen, setSidebarOpen] = useState(false);

      useEffect(() => {
        if (!auth) return;
        setLoadingDb(true);

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error(error);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (!currentUser) setLoadingDb(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;

        const profileRef = db.collection('artifacts').doc(appId)
                             .collection('users').doc(user.uid)
                             .collection('profile').doc('data');
                             
        profileRef.get().then((docSnap) => {
          if (docSnap.exists) setProfile(docSnap.data().result);
          setLoadingDb(false);
        }).catch(console.error);

        const simRef = db.collection('artifacts').doc(appId)
                         .collection('users').doc(user.uid)
                         .collection('simulations');
                         
        const unsubscribeSims = simRef.onSnapshot((snapshot) => {
          const simData = [];
          snapshot.forEach((doc) => simData.push({ id: doc.id, ...doc.data() }));
          simData.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
          setSimulations(simData);
        }, console.error);

        return () => unsubscribeSims();
      }, [user]);

      useEffect(() => {
        const interval = setInterval(() => {
          setStocks(currentStocks => currentStocks.map(stock => {
            const changePercent = (Math.random() - 0.5) * 0.01; 
            return {
              ...stock,
              price: stock.price * (1 + changePercent),
              change: changePercent * 100
            };
          }));
        }, 5000);
        return () => clearInterval(interval);
      }, []);

      const handleSaveProfile = async (result) => {
        setProfile(result);
        if (user && db) {
          const profileRef = db.collection('artifacts').doc(appId)
                               .collection('users').doc(user.uid)
                               .collection('profile').doc('data');
          await profileRef.set({ result, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
        setActiveTab('dashboard');
        window.scrollTo(0,0);
      };

      const handleSaveSimulation = async (simData) => {
        if (user && db) {
          const simRef = db.collection('artifacts').doc(appId)
                           .collection('users').doc(user.uid)
                           .collection('simulations');
          await simRef.add({ ...simData, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

    // --- 2. API (ANÁLISE DE PERFIL) ---
    function SuitabilityAPI({ onComplete, currentProfile }) {
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({});

      const questions = [
        { id: 'q1', question: 'Qual o seu principal objetivo ao investir?', options: [
          { label: 'Proteger meu patrimônio assumindo o menor risco possível.', value: 1 },
          { label: 'Ter um ganho razoável, aceitando pequenas variações.', value: 2 },
          { label: 'Maximizar meus ganhos a longo prazo, mesmo com alto risco.', value: 3 }
        ]},
        { id: 'q2', question: 'Se seus investimentos caíssem 20% em um mês, o que você faria?', options: [
          { label: 'Sacaria tudo imediatamente para não perder mais.', value: 1 },
          { label: 'Aguardaria o mercado se recuperar, mas ficaria preocupado.', value: 2 },
          { label: 'Aproveitaria a queda para comprar mais investimentos baratos.', value: 3 }
        ]},
        { id: 'q3', question: 'Por quanto tempo pretende deixar seu dinheiro investido?', options: [
          { label: 'Menos de 1 ano (preciso do dinheiro em breve).', value: 1 },
          { label: 'De 1 a 5 anos.', value: 2 },
          { label: 'Mais de 5 anos (foco no longo prazo).', value: 3 }
        ]}
      ];

      const handleSelect = (qId, value) => {
        const newAnswers = { ...answers, [qId]: value };
        setAnswers(newAnswers);
        if (step < questions.length - 1) {
          setTimeout(() => setStep(step + 1), 300);
        } else {
          const totalScore = Object.values(newAnswers).reduce((a, b) => a + b, 0);
          let result = 'conservador';
          if (totalScore >= 5 && totalScore <= 7) result = 'moderado';
          if (totalScore >= 8) result = 'arrojado';
          setTimeout(() => onComplete(result), 500);
        }
      };

      if (currentProfile) {
        return (
          <div className="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm text-center border border-gray-200">
            <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
              <i className="fas fa-check-circle"></i>
            </div>
            <h2 className="text-2xl font-bold text-slate-800 mb-2">Seu Perfil: {currentProfile.toUpperCase()}</h2>
            <p className="text-slate-600 mb-8">Suas recomendações de investimentos já foram ajustadas.</p>
            <button onClick={() => { setAnswers({}); setStep(0); onComplete(null); }} className="text-emerald-600 font-medium hover:underline flex items-center justify-center gap-2 mx-auto">
              <i className="fas fa-sync-alt"></i> Refazer o teste
            </button>
          </div>
        );
      }

      const currentQ = questions[step];
      return (
        <div className="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200">
          <div className="mb-8 flex justify-between items-center text-sm font-medium text-slate-400">
            <span>Questão {step + 1} de {questions.length}</span>
            <div className="flex gap-1">
              {questions.map((_, i) => (
                <div key={i} className={`h-2 w-8 rounded-full ${i <= step ? 'bg-emerald-500' : 'bg-slate-100'}`} />
              ))}
            </div>
          </div>
          <h3 className="text-xl font-bold text-slate-800 mb-6">{currentQ.question}</h3>
          <div className="space-y-3">
            {currentQ.options.map((opt, i) => (
              <button key={i} onClick={() => handleSelect(currentQ.id, opt.value)} className="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-emerald-500 hover:bg-emerald-50 transition-all font-medium text-slate-700 shadow-sm">
                {opt.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // --- 3. SIMULADOR COM GRÁFICO ---
    function Simulator({ profile, onSave }) {
      const [initial, setInitial] = useState('1000');
      const [monthly, setMonthly] = useState('200');
      const [months, setMonths] = useState('12');
      const [results, setResults] = useState(null);
      const [timeline, setTimeline] = useState([]); // Dados para o Gráfico

      const calculate = () => {
        const P = parseFloat(initial) || 0;
        const PMT = parseFloat(monthly) || 0;
        const n = parseInt(months) || 1;

        const calcFV = (taxaAnual, isentoIR = false) => {
          const r = Math.pow(1 + taxaAnual, 1/12) - 1;
          const amount = P * Math.pow(1 + r, n) + PMT * ((Math.pow(1 + r, n) - 1) / r);
          const invested = P + (PMT * n);
          const profit = amount - invested;
          
          let irRate = 0;
          if (!isentoIR) {
            if (n <= 6) irRate = 0.225;
            else if (n <= 12) irRate = 0.20;
            else if (n <= 24) irRate = 0.175;
            else irRate = 0.15;
          }
          const tax = profit * irRate;
          return { total: amount - tax, profit: profit - tax, invested };
        };

        const res = [
          { name: 'Poupança', ...calcFV(RATES.POUPANCA, true), color: 'bg-blue-400' },
          { name: 'Tesouro Selic', ...calcFV(RATES.SELIC, false), color: 'bg-emerald-500' },
          { name: 'CDB (100% CDI)', ...calcFV(RATES.CDI, false), color: 'bg-violet-500' },
          { name: 'LCI/LCA (90% CDI)', ...calcFV(RATES.CDI * 0.90, true), color: 'bg-amber-500' },
          { name: 'Tesouro IPCA+', ...calcFV(RATES.IPCA_MAIS, false), color: 'bg-indigo-500' }
        ];
        res.sort((a, b) => b.total - a.total);
        setResults(res);

        // Gerar dados para o Gráfico de Evolução (apenas para o melhor produto)
        const bestTaxa = RATES.IPCA_MAIS; // Usando a maior taxa para exemplo de curva
        const rMensal = Math.pow(1 + bestTaxa, 1/12) - 1;
        let dataPontos = [];
        let acumulado = P;
        let investido = P;
        
        // Pega até 10 pontos de dados para não travar o navegador
        const step = Math.max(1, Math.floor(n / 10)); 
        
        for(let i = 0; i <= n; i+=step) {
            if(i > 0) {
               acumulado = P * Math.pow(1 + rMensal, i) + PMT * ((Math.pow(1 + rMensal, i) - 1) / rMensal);
               investido = P + (PMT * i);
            }
            dataPontos.push({ mes: i, valor: acumulado, investido: investido });
        }
        setTimeline(dataPontos);
      };

      useEffect(() => { calculate(); }, [initial, monthly, months]);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div className="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit space-y-6">
            <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
              <i className="fas fa-sliders-h text-emerald-500"></i> Parâmetros
            </h3>
            <div>
              <label className="block text-sm font-medium text-slate-600 mb-1">Valor Inicial (R$)</label>
              <input type="number" value={initial} onChange={e => setInitial(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-600 mb-1">Aporte Mensal (R$)</label>
              <input type="number" value={monthly} onChange={e => setMonthly(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-600 mb-1">Prazo (Meses)</label>
              <input type="number" value={months} onChange={e => setMonths(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" />
              <div className="flex gap-2 mt-2">
                {[12, 24, 60, 120].map(m => (
                  <button key={m} onClick={() => setMonths(m.toString())} className="text-xs px-2 py-1 bg-slate-100 rounded text-slate-600 hover:bg-slate-200 shadow-sm">{m}m</button>
                ))}
              </div>
            </div>
            <button onClick={() => onSave({initial, monthly, months, bestResult: results[0].total})} className="w-full bg-slate-900 text-white font-medium py-3 rounded-lg hover:bg-slate-800 transition flex items-center justify-center gap-2 shadow-md">
              <i className="fas fa-save"></i> Salvar Simulação
            </button>
          </div>

          <div className="lg:col-span-2 space-y-6">
            {results && (
              <>
                <div className="bg-emerald-50 border border-emerald-200 p-6 rounded-xl flex items-center gap-4 shadow-sm">
                  <div className="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white shrink-0 shadow-lg text-xl">
                    <i className="fas fa-trophy"></i>
                  </div>
                  <div>
                    <p className="text-emerald-800 text-sm font-medium mb-1">A Melhor Opção Rendou (Líquido):</p>
                    <h2 className="text-3xl font-black text-emerald-900">
                      R$ {results[0].total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                    </h2>
                    <p className="text-emerald-700 text-sm">
                      No <strong>{results[0].name}</strong>, você teria R$ {results[0].profit.toLocaleString('pt-BR', {minimumFractionDigits: 2})} de lucro puro pós IR.
                    </p>
                  </div>
                </div>

                {/* GRÁFICO VISUAL DE EVOLUÇÃO (CSS PURO) */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i className="fas fa-chart-bar text-blue-500"></i> Evolução Patrimonial
                  </h3>
                  <div className="h-48 flex items-end justify-between gap-1 mt-4">
                    {timeline.map((pt, idx) => {
                      const maxVal = timeline[timeline.length - 1].valor;
                      const heightPercent = (pt.valor / maxVal) * 100;
                      const invPercent = (pt.investido / pt.valor) * 100; // Porcentagem do dinheiro "tirado do bolso" em relação ao total
                      
                      return (
                        <div key={idx} className="w-full relative group flex flex-col justify-end" style={{height: `${heightPercent}%`}}>
                          {/* Tooltip Hover */}
                          <div className="absolute bottom-full mb-2 hidden group-hover:block bg-slate-800 text-white text-xs p-2 rounded whitespace-nowrap z-10 shadow-lg">
                            Mês {pt.mes}<br/>
                            Total: R$ {pt.valor.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0})}<br/>
                            Juros: R$ {(pt.valor - pt.investido).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0})}
                          </div>
                          
                          {/* Barra Principal (Total) */}
                          <div className="w-full bg-emerald-400 rounded-t-sm relative overflow-hidden h-full flex flex-col justify-end transition-all hover:bg-emerald-300">
                             {/* Barra Interna (Investido do Bolso) */}
                             <div className="w-full bg-slate-300" style={{height: `${invPercent}%`}}></div>
                          </div>
                          <span className="text-[10px] text-slate-400 mt-1 text-center truncate">M{pt.mes}</span>
                        </div>
                      )
                    })}
                  </div>
                  <div className="flex gap-4 mt-4 text-xs justify-center">
                    <div className="flex items-center gap-1"><div className="w-3 h-3 bg-slate-300 rounded"></div> Dinheiro Investido</div>
                    <div className="flex items-center gap-1"><div className="w-3 h-3 bg-emerald-400 rounded"></div> Juros Compostos</div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <h3 className="text-lg font-bold text-slate-800 mb-6">Comparação Renda Fixa</h3>
                  <div className="space-y-6">
                    {results.map((item, idx) => {
                      const percent = (item.total / results[0].total) * 100;
                      return (
                        <div key={item.name}>
                          <div className="flex justify-between items-end mb-2">
                            <div>
                              <p className="font-bold text-slate-800 flex items-center gap-2">
                                {idx === 0 && <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">1º</span>} {item.name}
                              </p>
                            </div>
                            <div className="text-right">
                              <p className="font-bold text-slate-800">R$ {item.total.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                              <p className="text-xs text-emerald-600">+ R$ {item.profit.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                            </div>
                          </div>
                          <div className="w-full bg-slate-100 rounded-full h-3">
                            <div className={`${item.color} h-3 rounded-full transition-all duration-1000`} style={{ width: `${percent}%` }}></div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  
                  <div className="mt-8 bg-slate-50 p-6 rounded-xl border border-slate-200">
                    <h4 className="text-md font-bold text-slate-800 mb-4"><i className="fas fa-info-circle text-blue-500"></i> Por que rende assim?</h4>
                    <div className="space-y-4 text-sm text-slate-600">
                      <p><strong>Poupança:</strong> Rende só 0,5% a.m + TR. É isenta, mas a base de cálculo é baixa e perde pra quase todos.</p>
                      <p><strong>Tesouro Selic:</strong> Rende a taxa básica (10,5%). Sofre IR regressivo. É o mais seguro do Brasil.</p>
                      <p><strong>Tesouro IPCA+:</strong> Protege seu dinheiro da inflação. Rende a variação do IPCA (custo de vida) somado a uma taxa fixa. Essencial para prazos longos.</p>
                      <p><strong>CDB (100% CDI):</strong> O CDI anda colado na Selic (10,4%). Empata com o Tesouro Selic e também sofre desconto de IR.</p>
                      <p><strong>LCI/LCA (90% CDI):</strong> O percentual bruto é menor, mas é <strong>ISENTA de Imposto de Renda</strong>! Entrega mais dinheiro líquido no curto/médio prazo.</p>
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // --- NOVA ABA: CALCULADORA DE OBJETIVOS (MATEMÁTICA REVERSA) ---
    function CalculadoraObjetivos() {
      const [objetivo, setObjetivo] = useState('Carro Novo');
      const [valorObjetivo, setValorObjetivo] = useState('80000');
      const [prazoAnos, setPrazoAnos] = useState('3');
      const [valorInicial, setValorInicial] = useState('5000');
      
      // Cálculo Reverso: Quanto poupar por mês? (Fórmula PMT)
      const taxaAnual = RATES.CDI; // Usaremos o CDI como média conservadora
      const rMensal = Math.pow(1 + taxaAnual, 1/12) - 1;
      const nMeses = parseInt(prazoAnos) * 12 || 1;
      const FV = parseFloat(valorObjetivo) || 0;
      const PV = parseFloat(valorInicial) || 0;
      
      // FV = PV*(1+r)^n + PMT*[((1+r)^n - 1)/r]
      // PMT = [FV - PV*(1+r)^n] * r / [(1+r)^n - 1]
      let aporteNecessario = 0;
      const fatorJuros = Math.pow(1 + rMensal, nMeses);
      
      if (fatorJuros > 1) {
         aporteNecessario = (FV - (PV * fatorJuros)) * rMensal / (fatorJuros - 1);
      }
      
      const possivel = aporteNecessario > 0;

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="mb-2">
            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-2">
              <i className="fas fa-flag-checkered text-amber-500"></i> Planejador de Objetivos
            </h2>
            <p className="text-slate-600 text-sm">Diga o que você quer comprar e quando. Nossa Inteligência dirá exatamente quanto você precisa economizar por mês para chegar lá.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Qual o seu objetivo?</label>
                <input type="text" value={objetivo} onChange={e => setObjetivo(e.target.value)} placeholder="Ex: Viagem, Carro, Casa..." className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Valor do Objetivo (R$)</label>
                <input type="number" value={valorObjetivo} onChange={e => setValorObjetivo(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Dinheiro que já tem guardado (R$)</label>
                <input type="number" value={valorInicial} onChange={e => setValorInicial(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Em quantos ANOS quer realizar?</label>
                <input type="number" value={prazoAnos} onChange={e => setPrazoAnos(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" />
              </div>
            </div>

            <div className="flex flex-col justify-center">
              <div className="bg-amber-50 p-8 rounded-xl border border-amber-200 shadow-sm text-center">
                <p className="text-amber-800 text-sm font-bold uppercase tracking-widest mb-4">Plano de Ação: {objetivo || 'Objetivo'}</p>
                
                {possivel ? (
                  <>
                    <p className="text-slate-600 mb-2">Você precisará investir mensalmente:</p>
                    <h2 className="text-5xl font-black text-amber-600 mb-4">
                      R$ {aporteNecessario.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits:2})}
                    </h2>
                    <p className="text-sm text-amber-700 leading-relaxed bg-amber-100 p-4 rounded-lg">
                      Se você aplicar este valor todo mês em um investimento conservador atrelado à taxa Selic (rendendo aprox. {((taxaAnual)*100).toFixed(1)}% ao ano), os juros compostos trabalharão a seu favor e você terá <strong>R$ {parseFloat(valorObjetivo).toLocaleString('pt-BR')}</strong> em {prazoAnos} anos.
                    </p>
                  </>
                ) : (
                  <div className="text-amber-700">
                    <i className="fas fa-check-circle text-4xl mb-4 text-emerald-500"></i>
                    <p className="font-bold text-xl">Você já atingiu esse objetivo!</p>
                    <p className="text-sm mt-2">O dinheiro que você já tem guardado, com os juros do período, ultrapassa o valor do objetivo.</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- NOVA ABA: INDEPENDÊNCIA FINANCEIRA (VIVER DE RENDA) ---
    function IndependenciaFinanceira() {
      const [gastoMensal, setGastoMensal] = useState('5000');
      const [patrimonioAtual, setPatrimonioAtual] = useState('0');
      const [aporteMensal, setAporteMensal] = useState('1000');
      const [taxaReal, setTaxaReal] = useState('6'); // % a.a. acima da inflação

      // Cálculos Matemáticos
      const taxaRealMensal = Math.pow(1 + (parseFloat(taxaReal)/100), 1/12) - 1;
      const metaPatrimonio = parseFloat(gastoMensal) / taxaRealMensal;

      let p = parseFloat(patrimonioAtual) || 0;
      const pmt = parseFloat(aporteMensal) || 0;
      const fv = metaPatrimonio;
      
      let mesesNecessarios = 0;
      if (pmt > 0 || (p * taxaRealMensal) > 0) {
          const num = (fv * taxaRealMensal + pmt);
          const den = (p * taxaRealMensal + pmt);
          if (num > 0 && den > 0) {
             mesesNecessarios = Math.log(num / den) / Math.log(1 + taxaRealMensal);
          } else {
             mesesNecessarios = Infinity;
          }
      } else {
          mesesNecessarios = Infinity;
      }

      const anos = Math.floor(mesesNecessarios / 12);
      const meses = Math.ceil(mesesNecessarios % 12);

      return (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="mb-2">
            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-2">
              <i className="fas fa-bullseye text-blue-500"></i> Calculadora de Aposentadoria (FIRE)
            </h2>
            <p className="text-slate-600 text-sm">Descubra quanto dinheiro você precisa acumular para viver apenas dos rendimentos, protegendo seu poder de compra da inflação.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Renda Mensal Desejada (R$)</label>
                <input type="number" value={gastoMensal} onChange={e => setGastoMensal(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                <p className="text-xs text-slate-400 mt-1">Quanto você precisa por mês para viver bem?</p>
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Quanto vai investir por mês? (R$)</label>
                <input type="number" value={aporteMensal} onChange={e => setAporteMensal(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Patrimônio Atual (R$)</label>
                <input type="number" value={patrimonioAtual} onChange={e => setPatrimonioAtual(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1">Taxa de Juros REAL (% ao ano)</label>
                <input type="number" value={taxaReal} onChange={e => setTaxaReal(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                <p className="text-xs text-slate-400 mt-1">Rentabilidade ACIMA da inflação (Padrão histórico: 4% a 6%).</p>
              </div>
            </div>

            <div className="space-y-6">
              <div className="bg-slate-900 text-white p-6 rounded-xl shadow-lg border border-slate-800">
                <p className="text-slate-400 text-sm font-medium mb-1">Seu "Número Mágico" é:</p>
                <h2 className="text-4xl font-black text-emerald-400 mb-2">
                  R$ {metaPatrimonio > 0 && isFinite(metaPatrimonio) ? metaPatrimonio.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits:2}) : '0,00'}
                </h2>
                <p className="text-slate-300 text-sm leading-relaxed">
                  Ao atingir este valor, uma taxa real de {taxaReal}% a.a. irá gerar exatos <strong className="text-white">R$ {parseFloat(gastoMensal || 0).toLocaleString('pt-BR')}</strong> por mês de forma passiva, sem que você precise mexer no dinheiro principal.
                </p>
              </div>

              {mesesNecessarios !== Infinity && metaPatrimonio > 0 ? (
                <div className="bg-blue-50 border border-blue-200 p-6 rounded-xl">
                  <p className="text-blue-800 text-sm font-bold mb-2 uppercase tracking-wide">Tempo Estimado</p>
                  <div className="flex items-end gap-2">
                    <span className="text-5xl font-black text-blue-600">{anos}</span>
                    <span className="text-blue-800 font-medium pb-1">anos e</span>
                    <span className="text-5xl font-black text-blue-600">{meses}</span>
                    <span className="text-blue-800 font-medium pb-1">meses</span>
                  </div>
                  <p className="text-sm text-blue-600 mt-4">
                    Mantendo aportes de R$ {parseFloat(aporteMensal||0).toLocaleString('pt-BR')}/mês, você será financeiramente livre em aproximadamente {anos} anos.
                  </p>
                </div>
              ) : (
                <div className="bg-red-50 border border-red-200 p-6 rounded-xl text-red-700 text-sm">
                  Com os valores informados (sem aportes suficientes), você não atingirá o objetivo. Aumente o valor investido mensalmente.
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- 4. DICIONÁRIO ---
    function Dictionary() {
      const [searchTerm, setSearchTerm] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      const filtered = DICTIONARY_DATA.filter(i => i.title.toLowerCase().includes(searchTerm.toLowerCase()) || i.definition.toLowerCase().includes(searchTerm.toLowerCase()));

      return (
        <div className="max-w-4xl mx-auto">
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-2">
              <i className="fas fa-book-open text-emerald-500"></i> Dicionário Completo
            </h2>
            <p className="text-slate-600 text-sm">Entenda como funciona absolutamente cada produto do mercado financeiro.</p>
          </div>
          <div className="relative mb-6">
            <i className="fas fa-search absolute left-4 top-4 text-slate-400"></i>
            <input type="text" placeholder="Busque por CDB, LCI, FII, Swap..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-emerald-500 outline-none shadow-sm" />
          </div>
          <div className="space-y-4">
            {filtered.map(item => (
              <div key={item.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <button onClick={() => setExpandedId(expandedId === item.id ? null : item.id)} className="w-full flex justify-between p-5 hover:bg-slate-50">
                  <span className="font-bold text-slate-800">{item.title}</span>
                  <i className={`fas fa-chevron-down text-slate-400 transition-transform ${expandedId === item.id ? 'rotate-180' : ''}`}></i>
                </button>
                {expandedId === item.id && (
                  <div className="px-5 pb-5 pt-2 border-t border-slate-100 text-sm animate-fade-in">
                    <p className="text-slate-700 mb-4 leading-relaxed"><strong className="text-emerald-700">O que é? </strong> {item.definition}</p>
                    <div className="grid md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl mb-4 border border-slate-100">
                      <div>
                        <p className="font-bold text-blue-700 mb-1">Como rende?</p>
                        <p className="text-slate-600 leading-relaxed">{item.howItYields}</p>
                      </div>
                      <div>
                        <p className="font-bold text-amber-700 mb-1">Baseado em que?</p>
                        <p className="text-slate-600 leading-relaxed">{item.basis}</p>
                      </div>
                    </div>
                    <ul className="space-y-3 text-slate-700 mt-4 border-t border-slate-100 pt-4">
                      <p className="font-bold text-slate-800">Casos Práticos / Exemplos:</p>
                      {item.cases.map((c, i) => (
                        <li key={i} className="flex gap-2">
                          <i className="fas fa-arrow-right text-emerald-500 mt-1"></i>
                          <span>{c}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- 5. COTAÇÕES E NOTÍCIAS ---
    function MarketStocks({ stocks }) {
      return (
        <div className="max-w-4xl mx-auto">
          <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
             <i className="fas fa-chart-area text-blue-500"></i> Mercado ao Vivo (Simulado)
          </h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {stocks.map(stock => {
              const isUp = stock.change >= 0;
              return (
                <div key={stock.symbol} className="bg-white p-5 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow">
                  <div className="flex justify-between items-start mb-2">
                    <span className="font-bold text-lg">{stock.symbol}</span>
                    <i className={`fas ${isUp ? 'fa-arrow-trend-up text-emerald-500' : 'fa-arrow-trend-down text-red-500'}`}></i>
                  </div>
                  <p className="text-xs text-slate-500 mb-2">{stock.name}</p>
                  <div className="flex justify-between items-end">
                    <span className="text-xl font-black">R$ {stock.price.toFixed(2)}</span>
                    <span className={`text-sm font-bold ${isUp ? 'text-emerald-500' : 'text-red-500'}`}>{isUp?'+':''}{stock.change.toFixed(2)}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function NewsFeed({ news }) {
      return (
        <div className="max-w-4xl mx-auto">
          <h2 className="text-2xl font-bold text-slate-800 mb-6"><i className="fas fa-newspaper text-blue-500"></i> Plantão de Notícias</h2>
          <div className="space-y-4">
            {news.map(item => (
              <a 
                key={item.id} 
                href={item.url} 
                target="_blank" 
                rel="noopener noreferrer" 
                className="block bg-white p-6 rounded-xl border border-gray-200 hover:bg-slate-50 hover:border-blue-300 transition-all group shadow-sm"
              >
                <div className="flex justify-between items-start">
                  <div>
                    <div className="text-xs text-slate-500 mb-1 font-medium bg-slate-100 px-2 py-0.5 rounded inline-block">
                      {item.source} • {item.time}
                    </div>
                    <h3 className="font-bold text-slate-800 text-lg mt-2 group-hover:text-blue-600 transition-colors">
                      {item.title}
                    </h3>
                  </div>
                  <div className="bg-slate-50 p-3 rounded-full group-hover:bg-blue-50 transition-colors shrink-0 ml-4">
                    <i className="fas fa-external-link-alt text-slate-400 group-hover:text-blue-500"></i>
                  </div>
                </div>
              </a>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
